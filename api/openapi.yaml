openapi: 3.0.3
info:
  description: API for MCPCat application
  title: MCPCat API
  version: v1
servers:
- description: Local server
  url: http://localhost:8000
paths:
  /v1/public/events/:
    post:
      description: Submit analytics events for a project. Returns immediately with
        202 Accepted.
      operationId: publishEvent
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/publishEvent_request"
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventAcceptedResponse"
          description: ""
        "400":
          content:
            application/json:
              schema:
                description: Invalid request data
          description: ""
        "404":
          content:
            application/json:
              schema:
                description: Project not found
          description: ""
      security:
      - tokenAuth: []
      - {}
      summary: Publish analytics event
      tags:
      - Events
  /v1/schema/public/:
    get:
      description: |-
        OpenApi3 schema for this API. Format can be selected via content negotiation.

        - YAML: application/vnd.oai.openapi
        - JSON: application/vnd.oai.openapi+json
